<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs – Jobstogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&family=Roboto:wght@800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="jobstogo-shared.css" />
  <style>
    .jobs-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .page-title { font-weight: 700; font-size: 32px; line-height: 40px; }
    .post-job-btn {
      height: 48px;
      padding: 0 24px;
      background: var(--c-pink);
      border: none;
      color: #fff;
      border-radius: 8px;
      font-family: "Red Hat Text", sans-serif;
      font-weight: 700; font-size: 16px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .post-job-btn:hover { background: rgb(180,3,147); }

    .filter-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .filter-spacer { flex: 1; }
    .filter-btn {
      height: 48px;
      padding: 0 16px;
      border-radius: 8px;
      background: #fff;
      border: 2px solid var(--c-border);
      font-family: "Red Hat Text", sans-serif;
      font-weight: 700; font-size: 16px;
      color: var(--c-text);
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .filter-btn:hover { background: rgba(15,21,26,0.03); }
    .filter-icon-btn {
      width: 48px; height: 48px;
      border-radius: 8px;
      background: #fff;
      border: 2px solid var(--c-border);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--c-text);
    }
    .filter-icon-btn:hover { background: rgba(15,21,26,0.03); }

    /* Jobs table */
    .jobs-table {
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .table-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px 80px 110px 48px;
      gap: 24px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--c-border);
      font-weight: 700; font-size: 14px; line-height: 20px;
      color: var(--c-text);
    }
    .table-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px 80px 110px 48px;
      gap: 24px;
      padding: 24px;
      border-bottom: 1px solid var(--c-border);
      align-items: start;
    }
    .table-row:last-of-type { border-bottom: none; }

    .job-cell { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .job-title {
      font-size: 18px; line-height: 24px;
      font-weight: 700;
      color: var(--c-blue);
      text-decoration: none;
    }
    .job-title:hover { text-decoration: underline; }
    .job-location { font-size: 16px; line-height: 24px; color: var(--c-text); }
    .job-meta { font-size: 14px; line-height: 20px; color: var(--c-muted); }
    .reco-pill {
      display: inline-flex; align-items: center;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--c-light-card);
      font-size: 14px; line-height: 20px;
      color: var(--c-text);
      align-self: flex-start;
      text-decoration: none;
    }
    .reco-pill:hover { background: rgb(220,240,245); }
    .reco-pill b { font-weight: 700; color: var(--c-blue); text-decoration: underline; }

    .table-cell {
      font-size: 16px; line-height: 24px;
      color: var(--c-text);
      padding-top: 0;
    }
    .table-cell.link {
      color: var(--c-blue);
      font-weight: 700;
      text-decoration: none;
    }
    .table-cell.link:hover { text-decoration: underline; }

    .row-more {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--c-text);
      align-self: start;
    }
    .row-more:hover { background: rgba(15,21,26,0.04); }

    .table-footer {
      padding: 16px 24px;
      background: #fff;
      border-radius: 12px;
      margin-top: 16px;
      box-shadow: var(--shadow-card);
      font-size: 14px; line-height: 20px;
      color: var(--c-text);
    }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a class="logo" href="Welcome.html">Jobstogo</a>
    <div class="nav-items">

  </div>
  <div class="topnav-right">
    <button class="nav-btn" type="button">
      <svg width="22" height="19" viewBox="0 0 22.186 19" fill="none" aria-hidden="true">
        <path fill="currentColor" fill-rule="nonzero" d="M 4.093 19 C 3.81 19 3.551 18.913 3.318 18.738 C 3.085 18.563 2.926 18.333 2.843 18.05 L 0.043 7.95 C -0.04 7.717 -0.003 7.5 0.155 7.3 C 0.314 7.1 0.526 7 0.793 7 L 5.843 7 L 10.243 0.45 C 10.326 0.317 10.443 0.208 10.593 0.125 C 10.743 0.042 10.901 0 11.068 0 C 11.235 0 11.393 0.042 11.543 0.125 C 11.693 0.208 11.81 0.317 11.893 0.45 L 16.293 7 L 21.393 7 C 21.66 7 21.872 7.1 22.031 7.3 C 22.189 7.5 22.226 7.717 22.143 7.95 L 19.343 18.05 C 19.26 18.333 19.101 18.563 18.868 18.738 C 18.635 18.913 18.376 19 18.093 19 L 4.093 19 Z M 4.593 17 L 17.593 17 L 19.793 9 L 2.393 9 L 4.593 17 Z M 11.093 15 C 11.643 15 12.114 14.804 12.506 14.413 C 12.897 14.021 13.093 13.55 13.093 13 C 13.093 12.45 12.897 11.979 12.506 11.587 C 12.114 11.196 11.643 11 11.093 11 C 10.543 11 10.072 11.196 9.681 11.587 C 9.289 11.979 9.093 12.45 9.093 13 C 9.093 13.55 9.289 14.021 9.681 14.413 C 10.072 14.804 10.543 15 11.093 15 Z M 8.268 7 L 13.893 7 L 11.068 2.8 L 8.268 7 Z"/>

      <span>Basket</span>

    <button class="nav-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path fill="currentColor" fill-rule="nonzero" d="M 8 8 C 6.9 8 5.958 7.608 5.175 6.825 C 4.392 6.042 4 5.1 4 4 C 4 2.9 4.392 1.958 5.175 1.175 C 5.958 0.392 6.9 0 8 0 C 9.1 0 10.042 0.392 10.825 1.175 C 11.608 1.958 12 2.9 12 4 C 12 5.1 11.608 6.042 10.825 6.825 C 10.042 7.608 9.1 8 8 8 Z M 14 16 L 2 16 C 1.45 16 0.979 15.804 0.588 15.413 C 0.196 15.021 0 14.55 0 14 L 0 13.2 C 0 12.633 0.146 12.112 0.438 11.637 C 0.729 11.162 1.117 10.8 1.6 10.55 C 2.633 10.033 3.683 9.646 4.75 9.387 C 5.817 9.129 6.9 9 8 9 C 9.1 9 10.183 9.129 11.25 9.387 C 12.317 9.646 13.367 10.033 14.4 10.55 C 14.883 10.8 15.271 11.162 15.562 11.637 C 15.854 12.112 16 12.633 16 13.2 L 16 14 C 16 14.55 15.804 15.021 15.413 15.413 C 15.021 15.804 14.55 16 14 16 Z M 2 14 L 14 14 L 14 13.2 C 14 13.017 13.954 12.85 13.863 12.7 C 13.771 12.55 13.65 12.433 13.5 12.35 C 12.6 11.9 11.692 11.562 10.775 11.337 C 9.858 11.112 8.933 11 8 11 C 7.067 11 6.142 11.112 5.225 11.337 C 4.308 11.562 3.4 11.9 2.5 12.35 C 2.35 12.433 2.229 12.55 2.138 12.7 C 2.046 12.85 2 13.017 2 13.2 L 2 14 Z M 8 6 C 8.55 6 9.021 5.804 9.413 5.412 C 9.804 5.021 10 4.55 10 4 C 10 3.45 9.804 2.979 9.413 2.588 C 9.021 2.196 8.55 2 8 2 C 7.45 2 6.979 2.196 6.588 2.588 C 6.196 2.979 6 3.45 6 4 C 6 4.55 6.196 5.021 6.588 5.412 C 6.979 5.804 7.45 6 8 6 Z"/>
      </svg>
      <span>Name</span>
      <svg width="10" height="5" viewBox="0 0 10 5" fill="currentColor" aria-hidden="true">
        <path d="M5 5L0 0L10 0L5 5Z" fill-rule="nonzero" />
      </svg>
    </button>
  </div>
</nav>

<main class="page">
  <div class="jobs-header">
    <h1 class="page-title">Jobs</h1>
    <button class="post-job-btn" type="button">
      Post a job
      <svg width="10" height="6" viewBox="0 0 10 5" fill="currentColor" aria-hidden="true"><path d="M5 5L0 0L10 0L5 5Z" fill-rule="nonzero" /></svg>
    </button>
  </div>

  <div class="filter-row">
    <button class="filter-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path fill="currentColor" d="M3 6h18v2H3V6zm3 5h12v2H6v-2zm4 5h4v2h-4v-2z"/></svg>
      All filters
    </button>
    <button class="filter-btn" type="button">
      Active (x)
      <svg width="10" height="5" viewBox="0 0 10 5" fill="currentColor"><path d="M5 5L0 0L10 0L5 5Z" fill-rule="nonzero" /></svg>
    </button>
    <button class="filter-btn" type="button">
      Date posted
      <svg width="10" height="5" viewBox="0 0 10 5" fill="currentColor"><path d="M5 5L0 0L10 0L5 5Z" fill-rule="nonzero" /></svg>
    </button>
    <button class="filter-icon-btn" type="button" aria-label="Search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path fill="currentColor" d="m15.5 14 5 5-1.5 1.5-5-5v-.79l-.27-.28A6.471 6.471 0 0 1 9.5 16C5.91 16 3 13.09 3 9.5S5.91 3 9.5 3 16 5.91 16 9.5c0 1.61-.59 3.09-1.57 4.23l.28.27h.79zm-6 0a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9z"/></svg>
    </button>
    <div class="filter-spacer"></div>
    <button class="filter-icon-btn" type="button" aria-label="Download">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path fill="currentColor" d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
    </button>
  </div>

  <div class="jobs-table">
    <div class="table-head">
      <span>Job</span>
      <span>Date posted</span>
      <span>Views</span>
      <span>Applications</span>
      <span></span>
    </div>

    <div class="table-row">
      <div class="job-cell">
        <a class="job-title" href="#" id="job-title-link">Front-End Developer</a>
        <span class="job-location">Holborn, London</span>
        <span class="job-meta">Premium+ Job</span>
        <a class="reco-pill" href="Application Management.html">View <b id="reco-count">&nbsp;7 recommended candidates&nbsp;</b> and invite them to apply.</a>
      </div>
      <span class="table-cell">22/04/26</span>
      <span class="table-cell">0</span>
      <a class="table-cell link" href="#">0</a>
      <button class="row-more" type="button" aria-label="More">
        <svg viewBox="0 0 4 16" width="4" height="16" fill="none"><path fill="currentColor" d="M 2 16 C 1.45 16 0.979 15.804 0.588 15.413 C 0.196 15.021 0 14.55 0 14 C 0 13.45 0.196 12.979 0.588 12.587 C 0.979 12.196 1.45 12 2 12 C 2.55 12 3.021 12.196 3.413 12.587 C 3.804 12.979 4 13.45 4 14 C 4 14.55 3.804 15.021 3.413 15.413 C 3.021 15.804 2.55 16 2 16 Z M 2 10 C 1.45 10 0.979 9.804 0.588 9.412 C 0.196 9.021 0 8.55 0 8 C 0 7.45 0.196 6.979 0.588 6.587 C 0.979 6.196 1.45 6 2 6 C 2.55 6 3.021 6.196 3.413 6.587 C 3.804 6.979 4 7.45 4 8 C 4 8.55 3.804 9.021 3.413 9.412 C 3.021 9.804 2.55 10 2 10 Z M 2 4 C 1.45 4 0.979 3.804 0.588 3.412 C 0.196 3.021 0 2.55 0 2 C 0 1.45 0.196 0.979 0.588 0.588 C 0.979 0.196 1.45 0 2 0 C 2.55 0 3.021 0.196 3.413 0.588 C 3.804 0.979 4 1.45 4 2 C 4 2.55 3.804 3.021 3.413 3.412 C 3.021 3.804 2.55 4 2 4 Z"/></svg>
      </button>
    </div>
  </div>

  <div class="table-footer">1-1 of 1 <b>active</b> jobs</div>
</main>

<script>
  // Recommended-candidate count reflects current state on Application Management.
  (function () {
    const TOTAL = 8;
    let invited = 0, unsuitable = 0;
    try {
      const s = JSON.parse(localStorage.getItem('jt-candidate-state-v1')) || {};
      invited = (s.invited || []).length;
      unsuitable = (s.unsuitable || []).length;
    } catch (e) {}
    const n = Math.max(0, TOTAL - invited - unsuitable);
    const el = document.getElementById('reco-count');
    if (el) el.innerHTML = '&nbsp;' + n + ' recommended candidate' + (n === 1 ? '' : 's') + '&nbsp;';
  })();

  // Use the job title entered on the Job Ad Form
  (function () {
    const el = document.getElementById('job-title-link');
    if (!el) return;
    try {
      const title = localStorage.getItem('jt-job-title');
      el.textContent = (title && title.trim()) ? title : 'Default job title';
    } catch (e) {
      el.textContent = 'Default job title';
    }
  })();
</script>

</body>

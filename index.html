<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Management – WCA Nurse Assessor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;600;700&family=Roboto:wght@800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: rgb(248, 248, 248);
      min-height: 100vh;
      font-family: "Red Hat Text", sans-serif;
      color: rgb(15, 21, 26);
    }

    /* ── Top nav ── */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      height: 60px;
      background: #fff;
      box-shadow: 0 2px 10px 0 rgba(15, 21, 26, 0.03);
      display: flex;
      align-items: center;
      padding: 0 16px 0 72px;
      justify-content: space-between;
    }

    .topnav-left { display: flex; align-items: center; gap: 24px; }

    .logo {
      font-family: "Roboto", sans-serif;
      font-weight: 800;
      font-size: 25px;
      line-height: 20px;
      color: rgb(207, 4, 169);
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-items { display: flex; align-items: center; }

    .nav-item {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-weight: 600;
      font-size: 16px;
      color: rgb(15, 21, 26);
      text-decoration: none;
      position: relative;
      white-space: nowrap;
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgb(255, 0, 205);
      border-radius: 3px 3px 0 0;
    }

    .topnav-right { display: flex; align-items: center; }

    .nav-btn {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      font-weight: 600;
      font-size: 16px;
      color: rgb(15, 21, 26);
      background: none;
      border: 0;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }

    .nav-btn .icon { display: block; color: rgb(15, 21, 26); }

    /* ── Page content ── */
    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 72px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Header block ── */
    .header-block { display: flex; flex-direction: column; gap: 24px; }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left { display: flex; flex-direction: column; gap: 8px; }

    .title-row { display: flex; align-items: center; gap: 8px; }

    .back-btn {
      width: 24px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      background: none;
      border: 0;
      color: rgb(15, 21, 26);
    }

    .job-title {
      font-weight: 700;
      font-size: 32px;
      line-height: 40px;
      color: rgb(15, 21, 26);
    }

    .job-details {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag-active {
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      background: rgb(238, 248, 237);
      border: 1px solid rgba(15, 21, 26, 0.08);
      font-size: 14px;
      line-height: 24px;
      color: rgb(61, 132, 57);
      white-space: nowrap;
    }

    .job-detail-text,
    .dot {
      font-size: 16px;
      line-height: 20px;
      color: rgb(15, 21, 26);
    }

    /* ── Edit / More buttons ── */
    .job-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .btn-outline {
      height: 48px;
      border-radius: 8px;
      background: transparent;
      border: 2px solid rgb(228, 228, 228);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: "Red Hat Text", sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: rgb(15, 21, 26);
    }

    .btn-outline.btn-edit { padding: 0 16px; }
    .btn-outline.btn-more { width: 48px; padding: 0 12px; }

    /* ── Section label ── */
    .section-label {
      font-weight: 700;
      font-size: 18px;
      line-height: 24px;
      color: rgb(15, 21, 26);
    }

    /* ── Metrics ── */
    .metrics-row { display: flex; gap: 24px; }

    .metric-card {
      flex: 1;
      height: 96px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 10px 0 rgba(15, 21, 26, 0.03);
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
    }

    .metric-value {
      font-weight: 700;
      font-size: 24px;
      line-height: 32px;
      color: rgb(15, 21, 26);
    }

    .metric-label {
      font-size: 16px;
      line-height: 20px;
      color: rgb(118, 119, 122);
      margin-top: 8px;
    }

    /* ── Actions rail ── */
    .actions-rail {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
    }

    .actions-left { display: flex; gap: 8px; align-items: center; }

    .btn-filter {
      height: 48px;
      border-radius: 8px;
      background: transparent;
      border: 2px solid rgb(228, 228, 228);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      cursor: pointer;
      font-family: "Red Hat Text", sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: rgb(15, 21, 26);
      white-space: nowrap;
    }

    .btn-filter svg { display: block; flex-shrink: 0; }

    .results-info { font-size: 16px; line-height: 20px; color: rgb(15, 21, 26); }

    /* ── Candidate grid ── */
    .candidate-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .candidate-card {
      background: #fff;
      border: 1px solid rgb(228, 228, 228);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .candidate-card.removing {
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding-bottom: 16px;
    }

    .card-name {
      font-weight: 700;
      font-size: 16px;
      line-height: 20px;
      color: rgb(15, 21, 26);
    }

    .card-active {
      font-size: 14px;
      line-height: 16px;
      color: rgb(118, 119, 122);
      margin-top: 4px;
    }

    .card-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    .btn-view {
      height: 40px;
      padding: 0 16px;
      border-radius: 8px;
      border: 2px solid rgb(8, 19, 81);
      background: transparent;
      font-family: "Red Hat Text", sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: rgb(8, 19, 81);
      cursor: pointer;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 2px solid rgb(228, 228, 228);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgb(15, 21, 26);
    }

    .btn-icon svg { display: block; }

    .card-divider {
      width: calc(100% + 32px);
      margin-left: -16px;
      height: 1px;
      background: rgb(228, 228, 228);
    }

    .card-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px 0;
    }

    .card-field-label {
      font-size: 14px;
      line-height: 16px;
      color: rgb(118, 119, 122);
      margin-bottom: 4px;
    }

    .card-field-value {
      font-size: 16px;
      line-height: 20px;
      color: rgb(15, 21, 26);
    }

    .card-skills-label {
      font-size: 14px;
      line-height: 16px;
      color: rgb(118, 119, 122);
      margin-bottom: 8px;
    }

    .card-chips { display: flex; gap: 8px; flex-wrap: wrap; }

    .chip {
      height: 36px;
      padding: 0 12px;
      border-radius: 4px;
      background: rgba(15, 21, 26, 0.03);
      font-size: 16px;
      line-height: 36px;
      color: rgb(15, 21, 26);
      white-space: nowrap;
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .candidate-grid { grid-template-columns: repeat(2, 1fr); }
      .page { padding: 24px 32px; }
      .topnav { padding: 0 16px 0 32px; }
    }
    @media (max-width: 640px) {
      .candidate-grid { grid-template-columns: 1fr; }
      .page { padding: 16px; }
      .topnav { padding: 0 12px; }
      .nav-items, .nav-btn span { display: none; }
      .header-row { flex-direction: column; }
      .job-title { font-size: 24px; line-height: 32px; }
    }
  </style>
</head>

  <script>
    // SVG cross icon used inside the dismiss button on each card.
    const CROSS_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13.150 13.150" fill="none" aria-hidden="true"><path d="M 6.575 7.975 L 1.675 12.875 C 1.492 13.058 1.258 13.15 0.975 13.15 C 0.692 13.15 0.458 13.058 0.275 12.875 C 0.092 12.692 0 12.458 0 12.175 C 0 11.892 0.092 11.658 0.275 11.475 L 5.175 6.575 L 0.275 1.675 C 0.092 1.492 0 1.258 0 0.975 C 0 0.692 0.092 0.458 0.275 0.275 C 0.458 0.092 0.692 0 0.975 0 C 1.258 0 1.492 0.092 1.675 0.275 L 6.575 5.175 L 11.475 0.275 C 11.658 0.092 11.892 0 12.175 0 C 12.458 0 12.692 0.092 12.875 0.275 C 13.058 0.458 13.15 0.692 13.15 0.975 C 13.15 1.258 13.058 1.492 12.875 1.675 L 7.975 6.575 L 12.875 11.475 C 13.058 11.658 13.15 11.892 13.15 12.175 C 13.15 12.458 13.058 12.692 12.875 12.875 C 12.692 13.058 12.458 13.15 12.175 13.15 C 11.892 13.15 11.658 13.058 11.475 12.875 L 6.575 7.975 Z" fill="currentColor" fill-rule="nonzero"/></svg>`;

    const candidates = [
      { name: 'Oliver',  active: 'Last active 2 hours ago', current: 'Web Developer',          desired: 'Web Developer',  location: 'Holborn, London',       eligibility: 'Eligible to work in UK', skills: ['User Research', 'AI', 'Usability Testing'] },
      { name: 'Sophia',  active: 'Last active 5 hours ago', current: 'Staff Nurse',            desired: 'Nurse Assessor', location: 'Camden, London',        eligibility: 'Eligible to work in UK', skills: ['Clinical Assessment', 'WCA'] },
      { name: 'James',   active: 'Last active 1 day ago',   current: 'Mental Health Nurse',    desired: 'Nurse Assessor', location: 'Islington, London',     eligibility: 'Eligible to work in UK', skills: ['Patient Care', 'Assessment', 'PIP'] },
      { name: 'Amara',   active: 'Last active 3 hours ago', current: 'Physiotherapist',        desired: 'WCA Assessor',   location: 'Holborn, London',       eligibility: 'Eligible to work in UK', skills: ['Physiotherapy', 'Assessment'] },
      { name: 'Daniel',  active: 'Last active 2 days ago',  current: 'Occupational Therapist', desired: 'Nurse Assessor', location: 'Westminster, London',   eligibility: 'Eligible to work in UK', skills: ['OT Assessment', 'WCA', 'Report Writing'] },
      { name: 'Priya',   active: 'Last active 4 hours ago', current: 'Registered Nurse',       desired: 'Nurse Assessor', location: 'Southwark, London',     eligibility: 'Eligible to work in UK', skills: ['Clinical Assessment', 'PIP'] },
      { name: 'Tom',     active: 'Last active 6 hours ago', current: 'Paramedic',              desired: 'WCA Assessor',   location: 'Lambeth, London',       eligibility: 'Eligible to work in UK', skills: ['Triage', 'Assessment', 'WCA'] },
      { name: 'Fatima',  active: 'Last active 1 hour ago',  current: 'Community Nurse',        desired: 'Nurse Assessor', location: 'Hackney, London',       eligibility: 'Eligible to work in UK', skills: ['Patient Care', 'Clinical Assessment'] },
      { name: 'Marcus',  active: 'Last active 3 days ago',  current: 'GP Practice Nurse',      desired: 'WCA Assessor',   location: 'Tower Hamlets, London', eligibility: 'Eligible to work in UK', skills: ['Assessment', 'PIP', 'WCA'] },
    ];

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function renderCard(c) {
      const skillChips = c.skills.map(s => `<span class="chip">${escapeHtml(s)}</span>`).join('');
      return `
        <div class="candidate-card">
          <div class="card-top">
            <div>
              <div class="card-name">${escapeHtml(c.name)}</div>
              <div class="card-active">${escapeHtml(c.active)}</div>
            </div>
            <div class="card-actions">
              <button class="btn-view" type="button">View</button>
              <button class="btn-icon" type="button" aria-label="Dismiss">${CROSS_SVG}</button>
            </div>
          </div>
          <div class="card-divider"></div>
          <div class="card-fields">
            <div><div class="card-field-label">Current job title</div><div class="card-field-value">${escapeHtml(c.current)}</div></div>
            <div><div class="card-field-label">Desired job title</div><div class="card-field-value">${escapeHtml(c.desired)}</div></div>
            <div><div class="card-field-label">Location</div><div class="card-field-value">${escapeHtml(c.location)}</div></div>
            <div><div class="card-field-label">Work eligibility</div><div class="card-field-value">${escapeHtml(c.eligibility)}</div></div>
          </div>
          <div class="card-skills-label">Matching skills</div>
          <div class="card-chips">${skillChips}</div>
        </div>
      `;
    }

    const grid = document.getElementById('candidate-grid');
    const matchesCount = document.getElementById('matches-count');
    const resultsInfo = document.getElementById('results-info');

    grid.innerHTML = candidates.map(renderCard).join('');

    function updateCounts() {
      const visible = grid.querySelectorAll('.candidate-card:not(.removing):not(.removed)').length;
      matchesCount.textContent = visible;
      resultsInfo.textContent = `1 – ${visible} of ${visible} matches`;
    }

    grid.addEventListener('click', (e) => {
      const dismissBtn = e.target.closest('.btn-icon');
      if (!dismissBtn) return;
      const card = dismissBtn.closest('.candidate-card');
      if (!card || card.classList.contains('removing')) return;

      card.classList.add('removing');
      // Update count immediately so the metric is accurate during animation
      updateCounts();

      card.addEventListener('transitionend', () => {
        card.classList.add('removed');
        card.style.display = 'none';
      }, { once: true });
    });
  </script>
</body>
</html>
